name: Package and Release

on:
  push:
    branches:
      - master

jobs:
  check-version:
    runs-on: windows-2022
    outputs:
      version_changed: ${{ steps.check_versions.outputs.version_changed }}
      current_version: ${{ steps.check_versions.outputs.current_version }}
      previous_version: ${{ steps.check_versions.outputs.previous_version }}
      alias_version: ${{ steps.compute_alias.outputs.alias_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # we need the last two commits to check if the version changed

      - name: Get package version
        id: check_versions
        run: |
          $previous_version = git show HEAD~1:release/app/package.json | Select-String -Pattern '"version":' | ForEach-Object { $_ -replace '.*?: "(.*)",', '$1' }
          $current_version = git show HEAD:release/app/package.json | Select-String -Pattern '"version":' | ForEach-Object { $_ -replace '.*?: "(.*)",', '$1' }

          "previous_version=$previous_version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "current_version=$current_version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          if ($previous_version -ne $current_version) {
            "version_changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "version_changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

          "Previous Version = $previous_version" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Current Version = $current_version" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Compute alias version
        id: compute_alias
        uses: actions/github-script@v6
        with:
          script: |
            const version = '${{ steps.check_versions.outputs.current_version }}';
            const [major, minor, patch] = version.split('.').map(Number);

            // Only alias when releasing a new minor version (patch = 0),
            // e.g. 1.9.0 gets an alias of 1.8.x+1 so old links stay valid.
            if (patch !== 0 || minor === 0) {
              core.setOutput('alias_version', '');
              return;
            }

            // Find the highest existing tag for the previous minor to get the next patch.
            const prevMinor = minor - 1;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const pattern = new RegExp(`^v${major}\\.${prevMinor}\\.(\\d+)$`);
            const maxPatch = releases.reduce((max, r) => {
              const m = r.tag_name.match(pattern);
              return m ? Math.max(max, parseInt(m[1], 10)) : max;
            }, -1);

            const aliasVersion = `${major}.${prevMinor}.${maxPatch + 1}`;
            core.setOutput('alias_version', aliasVersion);
            console.log(`Alias version: ${aliasVersion}`);

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          architecture: 'x64'

      - name: Install MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      # GitHub git dependencies don't work in GitHub Action workflows,
      # so we remove CascLib from package.json and clone it manually instead.
      - name: Remove CascLib from package.json
        run: npm remove CascLib --force

      - name: Install dependencies
        run: npm install

      - name: Clone CascLib source
        run: git clone https://github.com/ladislav-zezula/CascLib.git node_modules/CascLib

      - name: Build package
        run: npm run package

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/build/*.zip

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # GitHub git dependencies don't work in GitHub Action workflows,
      # so we remove CascLib from package.json and clone it manually instead.
      - name: Remove CascLib from package.json
        run: npm remove CascLib --force

      - name: Install dependencies
        run: npm install

      - name: Clone CascLib source
        run: git clone https://github.com/ladislav-zezula/CascLib.git node_modules/CascLib

      - name: Build package
        run: npm run package

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/build/*.dmg

  release:
    needs: [check-version, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts

      - name: Delete release
        uses: actions/github-script@v6
        with:
          script: |
            const releaseName = "D2RMM ${{ needs.check-version.outputs.current_version }}";
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const releaseToDelete = releases.data.find(release => release.name === releaseName);
            if (releaseToDelete) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseToDelete.id
              });
              console.log(`Release ${releaseName} deleted successfully.`);
            } else {
              console.log(`Release ${releaseName} not found.`);
            }

      - name: Delete tag
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = "v${{ needs.check-version.outputs.current_version }}";
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`
              });
              console.log(`Tag ${tagName} deleted successfully.`);
            } catch (e) {
              if (e.message.includes('Reference does not exist')) {
                console.log(`Tag ${tagName} not found.`);
              } else {
                console.log(`Tag ${tagName} not deleted.`, e);
              }
            }

      - name: Create tag
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = "v${{ needs.check-version.outputs.current_version }}";
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha
              });
              console.log(`Tag ${tagName} created successfully.`);
            } catch (e) {
              console.log(`Tag ${tagName} not created.`, e);
              core.setFailed(e.message);
            }

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: D2RMM ${{ needs.check-version.outputs.current_version }}
          tag: v${{ needs.check-version.outputs.current_version }}
          draft: false
          prerelease: true
          artifacts: 'artifacts/*'
          artifactErrorsFailBuild: true
          generateReleaseNotes: false

      - name: Publish pre-release
        uses: actions/github-script@v6
        with:
          script: |
            const tagName = "v${{ needs.check-version.outputs.current_version }}";
            const { data: allReleases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const release = allReleases.find(r => r.tag_name === tagName);
            if (!release) {
              console.log(`Release ${tagName} not found.`);
              return;
            }

            // Generate release notes: commits since last non-pre-release.
            let body = '';
            let commitCount = 0;
            const lastRelease = allReleases.find(r => !r.prerelease && !r.draft);
            if (lastRelease) {
              const baseTag = lastRelease.tag_name;
              console.log(`Comparing ${baseTag}...${context.sha}`);
              const { data: comparison } = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${baseTag}...${context.sha}`
              });
              commitCount = comparison.commits.length;
              if (commitCount > 0) {
                const bullets = comparison.commits
                  .slice()
                  .reverse() // newest first
                  .map(c => {
                    const sha = c.sha.substring(0, 7);
                    const message = c.commit.message.split('\n')[0].replace(/`/g, "'");
                    return `- [\`${sha}\`](${c.html_url}) \`${message}\``;
                  })
                  .join('\n');
                body = `## Changes since ${lastRelease.name || baseTag}\n\n${bullets}`;
              }
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
              prerelease: true,
              body
            });
            console.log(`Release ${tagName} published as pre-release with ${commitCount} commits in release notes.`);

      - name: Create alias tag
        if: needs.check-version.outputs.alias_version != ''
        uses: actions/github-script@v6
        with:
          script: |
            const aliasTag = "v${{ needs.check-version.outputs.alias_version }}";

            // Delete any existing alias release so we can recreate it cleanly.
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const existing = releases.find(r => r.tag_name === aliasTag);
            if (existing) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id
              });
              console.log(`Deleted existing release ${aliasTag}`);
            }

            // Delete existing alias tag (if any).
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${aliasTag}`
              });
              console.log(`Deleted existing tag ${aliasTag}`);
            } catch (e) {
              if (!e.message.includes('Reference does not exist')) throw e;
            }

            // Create alias tag pointing to the same commit as the current release.
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${aliasTag}`,
              sha: context.sha
            });
            console.log(`Created alias tag ${aliasTag}`);

      - name: Create alias release
        if: needs.check-version.outputs.alias_version != ''
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: D2RMM ${{ needs.check-version.outputs.alias_version }}
          tag: v${{ needs.check-version.outputs.alias_version }}
          draft: false
          prerelease: true
          artifacts: 'artifacts/*'
          artifactErrorsFailBuild: true
          generateReleaseNotes: false
          body: 'This release contains the same files as [D2RMM ${{ needs.check-version.outputs.current_version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.current_version }}). It exists only to keep older download links working — please visit the link above for the latest version.'

      - name: Publish alias pre-release
        if: needs.check-version.outputs.alias_version != ''
        uses: actions/github-script@v6
        with:
          script: |
            const aliasTag = "v${{ needs.check-version.outputs.alias_version }}";
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const release = releases.find(r => r.tag_name === aliasTag);
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                draft: false,
                prerelease: true
              });
              console.log(`Alias release ${aliasTag} published as pre-release.`);
            }

      - name: Finalize pre-release
        if: needs.check-version.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: D2RMM ${{ needs.check-version.outputs.previous_version }}
          tag: v${{ needs.check-version.outputs.previous_version }}
          allowUpdates: true
          prerelease: false

  docs:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # GitHub dependencies don't work in GitHub Action workflows...
      - name: Remove CascLib dependency
        run: npm remove CascLib --force

      # Skip postinstall (native module compilation) since docs only need typedoc
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate documentation
        run: npm run docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
